models:
  provider: ollama
  base_url: http://127.0.0.1:11434
  timeout: 60
  fallback_enabled: true
  roles:
    hypothalamus: qwen2.5:3b-instruct
    central: qwen2.5:3b-instruct

runtime:
  always_on: true
  mode: full_local_guarded
  interval_seconds: 60
  start_delay_seconds: 3
  max_cycles: 0
  require_ollama: false
  safe_only: true
  self_test_on_start: true
  self_test_every_cycles: 5
  workers_always_on: true
  workers_autostart: true
  workers_watchdog: true
  worker_mode: full_local_guarded
  # Creadora -> Formadora -> Educadora -> evidencia -> promoción gobernada.
  continuous_runner_enabled: true
  continuous_runner_autonomy_level: promote_stable
  continuous_runner_interval_seconds: 60
  continuous_runner_max_cycles: 0

triadeos:
  enabled: true
  knowledge_graph:
    enabled: true
  event_engine:
    enabled: true
    scan_interval_seconds: 60
  scheduler:
    enabled: true
    max_wakeups_per_cycle: 5
  conservative:
    min_confidence_to_consolidate: 0.70
    max_consolidations_per_cycle: 3
