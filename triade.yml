models:
  provider: ollama
  base_url: http://127.0.0.1:11434
  timeout: 60
  fallback_enabled: true
  roles:
    hypothalamus: qwen2.5:3b-instruct
    central: qwen2.5:3b-instruct

runtime:
  always_on: true
  mode: full_local_guarded
  force_mode: full_local_guarded
  interval_seconds: 60
  start_delay_seconds: 3
  max_cycles: 0
  require_ollama: false
  safe_only: true
  self_test_on_start: true
  self_test_every_cycles: 5
  workers_always_on: true
  workers_autostart: true
  workers_watchdog: true
  worker_mode: full_local_guarded
  continuous_interval_seconds: 10
  continuous_max_cycles: 0
