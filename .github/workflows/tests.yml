name: Tríade Baseline Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  baseline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pydantic requests fastapi uvicorn numpy

      - name: Compile Python files
        run: |
          python - <<'PY'
          from pathlib import Path
          import py_compile

          roots = ["triade", "apps", "scripts", "tests"]
          errors = []

          for root in roots:
              root_path = Path(root)
              if not root_path.exists():
                  errors.append((root, "missing_root"))
                  continue

              for p in root_path.rglob("*.py"):
                  if "__pycache__" in p.parts:
                      continue
                  try:
                      py_compile.compile(str(p), doraise=True)
                  except Exception as exc:
                      errors.append((str(p), str(exc)))

          print(f"files_with_errors={len(errors)}")
          for path, err in errors:
              print(f"\n--- {path} ---\n{err}")

          raise SystemExit(1 if errors else 0)
          PY

      - name: Run neuron lifecycle tests
        run: |
          pytest tests/test_neuron_governance_cycle.py \
                 tests/test_experimental_neuron_runtime.py \
                 tests/test_stable_promotion_readiness.py \
                 tests/test_promote_neuron_stable.py -q
