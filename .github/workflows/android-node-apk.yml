name: Build Android Node APK

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "android/triade-node/**"
      - ".github/workflows/android-node-apk.yml"
  push:
    paths:
      - "android/triade-node/**"
      - ".github/workflows/android-node-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build debug APK
        run: gradle -p android/triade-node assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: triade-android-node-debug
          path: android/triade-node/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
