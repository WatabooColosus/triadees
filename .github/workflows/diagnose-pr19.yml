name: Diagnose PR19

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest and capture summary
        shell: bash
        run: |
          set +e
          pytest -q > pytest-output.txt 2>&1
          code=$?
          echo "$code" > pytest-exit-code.txt
          tail -n 250 pytest-output.txt > pytest-tail.txt
          exit 0
      - name: Upload pytest diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: pr19-pytest-diagnostic
          path: |
            pytest-output.txt
            pytest-tail.txt
            pytest-exit-code.txt
