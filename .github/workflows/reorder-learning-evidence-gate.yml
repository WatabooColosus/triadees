name: Reorder Learning Evidence Gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/learning-evidence-bridge
          fetch-depth: 0
      - name: Reorder consolidation gate
        run: python scripts/reorder_learning_evidence_gate.py
      - name: Validate syntax
        run: python -m py_compile triade/learning/pipeline.py
      - name: Remove temporary migration files
        run: rm scripts/reorder_learning_evidence_gate.py .github/workflows/reorder-learning-evidence-gate.yml
      - name: Commit correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "fix(learning): preserve consolidation gate order"
          git push origin HEAD:feat/learning-evidence-bridge
