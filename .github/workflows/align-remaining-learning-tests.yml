name: Align Remaining Learning Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/learning-evidence-bridge
          fetch-depth: 0
      - name: Align remaining tests
        run: python scripts/align_remaining_learning_tests.py
      - name: Validate imports
        run: python -m py_compile tests/test_trust_levels.py tests/test_worker_stable_consolidation_review.py tests/learning_evidence_helpers.py
      - name: Remove temporary files
        run: rm scripts/align_remaining_learning_tests.py .github/workflows/align-remaining-learning-tests.yml
      - name: Commit aligned tests
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "test(learning): align trust and worker promotion scenarios"
          git push origin HEAD:feat/learning-evidence-bridge
