name: Regression Gate

on:
  pull_request:
    branches: [main]

jobs:
  regression-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Regression Gate tests
        run: |
          pytest -q \
            tests/test_regression_gate.py \
            tests/test_learning_regression_gate_integration.py \
            tests/test_regression_protection_registry.py \
            tests/test_regression_rollback.py \
            tests/test_regression_statistics_observability.py \
            tests/test_regression_observability_integration.py \
            tests/test_learning_rollback_adapter.py
