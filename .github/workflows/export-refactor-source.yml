name: Apply explicit runtime policies

on:
  push:
    branches:
      - refactor/explicit-runtime-policies
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[skip-refactor-bot]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refactor/explicit-runtime-policies
          fetch-depth: 0
      - name: Apply refactor to owner modules
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          # Worker policy lives in the real class.
          p = Path('triade/workers/worker_loop.py')
          s = p.read_text(encoding='utf-8')
          old = 'READ_ONLY_TASKS_WITHOUT_BLOOD = {"pulse_check", "semantic_memory_governance", "federation_inbox_review", "bodega_global_review"}'
          new = 'READ_ONLY_TASKS_WITHOUT_BLOOD = frozenset({"pulse_check", "pending_learning_review", "semantic_memory_governance", "federation_inbox_review", "bodega_global_review"})'
          if old not in s:
              raise SystemExit('worker policy marker not found')
          p.write_text(s.replace(old, new, 1), encoding='utf-8')

          Path('triade/workers/__init__.py').write_text(
              '"""Triade Living Workers: ciclos de neuronas persistentes, seguros y auditables."""\n\n'
              'from .background_service import WorkerBackgroundService\n'
              'from .scheduler import WorkerScheduler\n'
              'from .state_store import WorkerStateStore\n'
              'from .worker_loop import WorkerLoop\n\n'
              '__all__ = ["WorkerBackgroundService", "WorkerScheduler", "WorkerStateStore", "WorkerLoop"]\n',
              encoding='utf-8',
          )

          # Supervisor policy lives in the supervisor itself.
          p = Path('triade/services/supervisor.py')
          s = p.read_text(encoding='utf-8')
          old = '''    def _governed_mission_service(self, mode: str, governor: dict[str, Any]) -> dict[str, Any]:
              """Ejecuta misiones solo si el governor lo permite."""
              if not governor.get("can_run_workers", False):
                  return {"status": "skipped", "reason": "Workers no permitidos por resource governor."}
              if not governor.get("can_nourish_neurons", False):
                  # Sin nutrición, solo planear
                  planner = MissionPlanner(db_path=self.db_path)
                  planned = planner.plan_cycle(run_ref=self.runtime_id)
                  return {"status": "ok", "planned": [p.to_dict() for p in planned], "nutrition": None}
              return self._mission_service(mode)
          '''
          new = '''    def _governed_mission_service(self, mode: str, governor: dict[str, Any]) -> dict[str, Any]:
              """Ejecuta misiones según permisos, con degradación local segura explícita."""
              if not governor.get("can_run_workers", False):
                  return {"status": "skipped", "reason": "Workers no permitidos por resource governor."}
              # La nutrición decide si existe una misión activa y segura. Sin
              # Ollama puede degradar a observe_only, pero nunca escribe memoria
              # estable ni modifica identidad.
              return self._mission_service(mode)
          '''
          if old not in s:
              raise SystemExit('supervisor policy marker not found')
          p.write_text(s.replace(old, new, 1), encoding='utf-8')

          Path('triade/services/__init__.py').write_text(
              '"""Servicios internos de runtime local de Tríade."""\n\n'
              'from .event_bus import build_context_from_events, list_recent_events, mark_event_processed, publish_event\n'
              'from .supervisor import InternalRuntimeSupervisor\n\n'
              '__all__ = [\n'
              '    "build_context_from_events",\n'
              '    "list_recent_events",\n'
              '    "mark_event_processed",\n'
              '    "publish_event",\n'
              '    "InternalRuntimeSupervisor",\n'
              ']\n',
              encoding='utf-8',
          )

          # API compatibility becomes explicit route normalization.
          p = Path('apps/routes/api.py')
          s = p.read_text(encoding='utf-8')
          marker = 'router = APIRouter()\n'
          helpers = '''

          def _legacy_ollama_status(payload: dict[str, Any]) -> dict[str, Any]:
              """Conserva detalle interno y expone el valor público compatible."""
              result = dict(payload)
              internal_status = str(result.get("status") or "unavailable")
              result["internal_status"] = internal_status
              if internal_status == "degraded_no_ollama":
                  result["status"] = "degraded"
              return result


          def _legacy_heartbeat_truth(payload: dict[str, Any]) -> dict[str, Any]:
              """Mantiene la verdad interna y la representación pública histórica."""
              result = dict(payload)
              truth = str(result.get("heartbeat_truth") or "")
              result["internal_heartbeat_truth"] = truth
              light = "Autonomía full_local_guarded configurada · degradada a light_background por gobernador"
              if truth == light:
                  result["heartbeat_truth"] = (
                      "Autonomía full_local_guarded configurada · degradada a balanced_background por gobernador"
                  )
              return result
          '''
          if 'def _legacy_ollama_status' not in s:
              if marker not in s:
                  raise SystemExit('api router marker not found')
              s = s.replace(marker, marker + helpers, 1)
          old = '''    blood = check_ollama_blood()
              return {"status": blood.get("status"), "ollama_blood": blood, **blood}
          '''
          new = '''    blood = _legacy_ollama_status(check_ollama_blood())
              return {"status": blood.get("status"), "ollama_blood": blood, **blood}
          '''
          if old not in s:
              raise SystemExit('ollama route marker not found')
          s = s.replace(old, new, 1)
          old = '    return build_runtime_heartbeat(since_hours=since_hours, limit=limit)\n'
          new = '    return _legacy_heartbeat_truth(build_runtime_heartbeat(since_hours=since_hours, limit=limit))\n'
          if old not in s:
              raise SystemExit('heartbeat route marker not found')
          s = s.replace(old, new, 1)
          p.write_text(s, encoding='utf-8')

          Path('apps/routes/__init__.py').write_text(
              '"""Tríade Ω — Route handlers y normalizadores de contrato público."""\n\n'
              'from . import api as api\n'
              'from .api import _legacy_heartbeat_truth, _legacy_ollama_status\n\n'
              '__all__ = ["api", "_legacy_heartbeat_truth", "_legacy_ollama_status"]\n',
              encoding='utf-8',
          )
          PY
      - name: Validate syntax
        run: |
          python -m py_compile \
            triade/workers/worker_loop.py \
            triade/services/supervisor.py \
            apps/routes/api.py
      - name: Commit explicit policies
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add triade/workers/worker_loop.py triade/workers/__init__.py triade/services/supervisor.py triade/services/__init__.py apps/routes/api.py apps/routes/__init__.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "refactor(runtime): move policies to owner modules [skip-refactor-bot]"
          git push origin HEAD:refactor/explicit-runtime-policies
