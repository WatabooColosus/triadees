name: Apply explicit runtime policies

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/explicit-runtime-policies
          fetch-depth: 0
      - name: Apply migration
        run: python scripts/apply_explicit_runtime_policies.py
      - name: Validate syntax
        run: python -m py_compile triade/workers/worker_loop.py triade/services/supervisor.py apps/routes/api.py
      - name: Remove temporary migration files
        run: rm scripts/apply_explicit_runtime_policies.py .github/workflows/export-refactor-source.yml
      - name: Commit refactor
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "refactor(runtime): move policies to owner modules"
          git push origin HEAD:refactor/explicit-runtime-policies
