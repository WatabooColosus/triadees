name: Validate PR17 Scope

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-cognitive-body:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run cognitive body tests
        run: pytest -q tests/test_cognitive_body.py
