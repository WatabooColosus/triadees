name: Diagnose Python Tests

on:
  pull_request:
    branches: [main]

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run first failing test only
        shell: bash
        run: |
          set -o pipefail
          pytest -q --maxfail=1 2>&1 | tail -120
