name: Diagnose Python Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/learning-evidence-bridge
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Capture first failing test
        id: pytest
        shell: bash
        continue-on-error: true
        run: |
          pytest -q --maxfail=1 > diagnostic_failure.txt 2>&1
      - name: Trim diagnostic
        if: steps.pytest.outcome == 'failure'
        run: tail -120 diagnostic_failure.txt > diagnostic_failure.trimmed && mv diagnostic_failure.trimmed diagnostic_failure.txt
      - name: Commit diagnostic
        if: steps.pytest.outcome == 'failure'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostic_failure.txt
          git commit -m "ci: capture first failing Python test"
          git push origin HEAD:feat/learning-evidence-bridge
      - name: Fail when pytest failed
        if: steps.pytest.outcome == 'failure'
        run: exit 1
