plugins {
    id "com.android.application"
}

android {
    namespace "local.triade.node"
    compileSdk 35

    defaultConfig {
        applicationId "local.triade.node"
        minSdk 26
        targetSdk 35
        versionCode 12
        versionName "0.10.2"
    }

    sourceSets {
        main {
            jniLibs.srcDirs = ["src/main/jniLibs"]
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
    }
}
